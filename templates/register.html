<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account - Primary User</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card shadow-sm p-4">
          <h3>Create Primary User Account</h3>
          <form id="registerForm" class="mt-3">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name</label>
                <input name="name" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">User ID</label>
                <input name="user_id" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input name="email" type="email" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Password</label>
                <input name="password" type="password" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input name="confirm_password" type="password" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Address</label>
                <input name="address" class="form-control" required>
              </div>
              <div class="col-12">
                <label class="form-label">Location where EV charger will be installed</label>
                <input name="install_location" class="form-control" required>
              </div>
            </div>
            <button class="btn btn-primary mt-4" type="submit">Create Account</button>
            <a href="/primary-login" class="btn btn-link mt-4">Existing user login</a>
          </form>
          <div id="msg" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const payload = {
        name: f.name.value.trim(),
        user_id: f.user_id.value.trim(),
        email: f.email.value.trim(),
        password: f.password.value,
        confirm_password: f.confirm_password.value,
        address: f.address.value.trim(),
        install_location: f.install_location.value.trim()
      };
      const res = await fetch('/api/register-primary', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });

      const msg = document.getElementById('msg');
      const data = await res.json();
      if (res.ok) {
        msg.innerHTML = `<div class="alert alert-success">Account created. Your PID: <strong>${data.PID}</strong></div>`;
        setTimeout(() => location.href = '/primary-login', 1400);
      } else {
        msg.innerHTML = `<div class="alert alert-danger">${data.error || 'Registration failed'}</div>`;
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Gateway - Sunshine Services</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm">
          <h3>Payment Gateway</h3>
          <p class="text-muted">Simulated payment step before final request submission.</p>
          <form id="paymentForm">
            <label class="form-label">Amount (INR)</label>
            <input name="amount" class="form-control mb-3" value="1000" required>
            <button class="btn btn-success" type="submit">Pay Now</button>
            <a href="/dashboard" class="btn btn-link">Back to Dashboard</a>
          </form>
          <div id="payMsg" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const pid = localStorage.getItem('sun_pid');
    if (!pid) location.href = '/primary-login';

    document.getElementById('paymentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const amount = e.target.amount.value.trim();
      const res = await fetch('/api/simulate-payment', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ pid, amount })
      });
      const data = await res.json();
      const msg = document.getElementById('payMsg');

      if (res.ok) {
        localStorage.setItem('payment_status', 'Paid');
        localStorage.setItem('payment_txn', data.transaction_id);
        msg.innerHTML = `<div class="alert alert-success">Payment success. Transaction: ${data.transaction_id}</div>`;
        setTimeout(() => location.href = '/dashboard', 1200);
      } else {
        msg.innerHTML = `<div class="alert alert-danger">${data.error || 'Payment failed'}</div>`;
      }
    });
  </script>
</body>
</html>

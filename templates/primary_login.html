<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Primary User Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4 shadow-sm">
          <h3>Primary User Login</h3>
          <form id="loginForm" class="mt-3">
            <label class="form-label">User ID or Email</label>
            <input name="user_id_or_email" class="form-control mb-3" required>
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control mb-3" required>
            <button class="btn btn-primary" type="submit">Login</button>
            <a class="btn btn-link" href="/register">Create account</a>
          </form>
          <div id="msg" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const payload = {
        user_id_or_email: f.user_id_or_email.value.trim(),
        password: f.password.value
      };
      const res = await fetch('/api/login-primary', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      const msg = document.getElementById('msg');

      if (res.ok) {
        localStorage.setItem('sun_pid', data.PID);
        localStorage.setItem('sun_name', data.Name || '');
        localStorage.setItem('sun_email', data.Email || '');
        localStorage.setItem('sun_install_location', data.InstallLocation || '');
        location.href = '/dashboard';
      } else {
        msg.innerHTML = `<div class="alert alert-danger">${data.error || 'Login failed'}</div>`;
      }
    });
  </script>
</body>
</html>
